<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{BOOK_NAME}} — Distillation</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
    :root {
        --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        --mono: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, monospace;
    }

    /* === Themes === */
    [data-theme="white"]   { --bg:#ffffff; --surface:#f6f8fa; --surface-hover:#eef1f5; --border:#d0d7de; --text:#1f2328; --text-dim:#656d76; --accent:#0969da; --green:#1a7f37; --orange:#9a6700; }
    [data-theme="paper"]   { --bg:#f8f5f0; --surface:#f0ece4; --surface-hover:#e8e3d8; --border:#d4cdc0; --text:#3d362e; --text-dim:#8a7e6e; --accent:#3b6d9c; --green:#4a7c59; --orange:#8b6914; }
    [data-theme="dusk"]    { --bg:#e2ddd8; --surface:#d5d0ca; --surface-hover:#cbc6bf; --border:#b8b2aa; --text:#3a3530; --text-dim:#6e6860; --accent:#4a6d8c; --green:#3d6b4f; --orange:#7a5d12; }
    [data-theme="oled"]    { --bg:#000000; --surface:#0a0a0a; --surface-hover:#141414; --border:#2a2a2a; --text:#e0e0e0; --text-dim:#707070; --accent:#4d9fff; --green:#3ddc84; --orange:#e0a020; }
    [data-theme="dimmed"]  { --bg:#0d1117; --surface:#161b22; --surface-hover:#1c2128; --border:#30363d; --text:#e6edf3; --text-dim:#8b949e; --accent:#58a6ff; --green:#3fb950; --orange:#d29922; }
    [data-theme="midnight"]{ --bg:#0a0e1a; --surface:#111627; --surface-hover:#192035; --border:#2a3150; --text:#c8d6e5; --text-dim:#636e88; --accent:#7cb7ff; --green:#4ecb71; --orange:#f0b040; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        padding: 2rem;
        max-width: 900px;
        margin: 0 auto;
    }

    .content { padding: 1rem; }
    .content h1 { font-size: 1.8rem; margin: 1rem 0 0.5rem; color: var(--accent); }
    .content h2 { font-size: 1.3rem; margin: 1.5rem 0 0.5rem; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    .content h3 { font-size: 1.1rem; margin: 1.2rem 0 0.4rem; color: var(--green); }
    .content p { margin-bottom: 0.8rem; }
    .content strong { color: var(--orange); }
    .content code { background: var(--surface); padding: 0.15em 0.4em; border-radius: 4px; font-family: var(--mono); font-size: 0.9em; color: var(--green); }
    .content pre { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; overflow-x: auto; margin: 1rem 0; }
    .content pre code { background: none; padding: 0; color: var(--text); }
    .content ul, .content ol { margin: 0.5rem 0 1rem 1.5rem; }
    .content li { margin-bottom: 0.4rem; }
    .content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .content blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; color: var(--text-dim); margin: 1rem 0; }

    .content table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
    .content th { background: var(--surface); color: var(--accent); font-weight: 600; text-align: left; padding: 0.6rem 0.8rem; border: 1px solid var(--border); }
    .content td { padding: 0.5rem 0.8rem; border: 1px solid var(--border); vertical-align: top; }
    .content tr:nth-child(even) { background: var(--surface); }
    .content tr:hover { background: var(--surface-hover); }

    .empty { color: var(--text-dim); font-style: italic; }
    .loading { color: var(--text-dim); font-style: italic; }

    .header { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid var(--border); }
    .header h1 { font-size: 2rem; color: var(--accent); border: none; margin: 0; overflow-wrap: break-word; word-break: break-word; }
    .subtitle { color: var(--text-dim); font-size: 0.9rem; }

    .theme-bar {
        display: flex; flex-wrap: wrap; align-items: center; gap: 0.35rem;
        margin-top: 0.8rem; font-size: 0.85rem; color: var(--text-dim);
    }
    .theme-bar .label { margin-right: 0.5rem; }
    .theme-btn {
        background: none; border: 1px solid var(--border); border-radius: 6px;
        padding: 0.25rem 0.55rem; cursor: pointer; font-size: 0.8rem;
        color: var(--text-dim); transition: all 0.15s; font-family: var(--font);
    }
    .theme-btn:hover { border-color: var(--text-dim); color: var(--text); }
    .theme-btn.active { border-color: var(--accent); color: var(--accent); background: var(--surface); font-weight: 600; }

    .tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 2px solid var(--border); }
    .tab-btn {
        background: var(--surface); border: 1px solid var(--border); border-bottom: none;
        color: var(--text-dim); padding: 0.75rem 1.5rem; cursor: pointer;
        font-size: 0.95rem; font-family: var(--font); transition: all 0.2s;
        border-radius: 8px 8px 0 0; margin-right: -1px;
    }
    .tab-btn:hover { background: var(--surface-hover); color: var(--text); }
    .tab-btn.active {
        background: var(--bg); color: var(--accent);
        border-bottom: 2px solid var(--bg); margin-bottom: -2px; font-weight: 600;
    }
    .tab-content {
        display: none; padding: 1.5rem; background: var(--bg);
        border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px;
    }
    .tab-content.active { display: block; }

    .chunk-accordion { margin-bottom: 0.5rem; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .chunk-accordion summary {
        background: var(--surface); padding: 1rem 1.25rem; cursor: pointer;
        font-weight: 600; color: var(--accent); transition: background 0.2s; user-select: none;
    }
    .chunk-accordion summary:hover { background: var(--surface-hover); }
    .chunk-accordion[open] summary { border-bottom: 1px solid var(--border); }

    @media (max-width: 600px) {
        body { padding: 0.5rem; }
        .tabs { flex-direction: column; }
        .tab-btn { border-radius: 0; }
        .tab-btn:first-child { border-radius: 8px 8px 0 0; }
        .theme-bar { gap: 0.25rem; }
        .theme-btn { padding: 0.2rem 0.4rem; font-size: 0.75rem; }
        .tab-content { padding: 0.75rem; }
        .content { padding: 0.5rem; }
        .chunk-accordion summary { padding: 0.75rem 1rem; }
    }
</style>
</head>
<body data-theme="dimmed">

<div class="header">
    <h1>📚 {{BOOK_NAME}}</h1>
    <div class="subtitle">Intellectual Distillation — Generated by BookConvert</div>
    <div class="theme-bar">
        <span class="label">Theme:</span>
        <button class="theme-btn" data-theme-btn="white">☀️ White</button>
        <button class="theme-btn" data-theme-btn="paper">📜 Paper</button>
        <button class="theme-btn" data-theme-btn="dusk">🌫️ Dusk</button>
        <button class="theme-btn" data-theme-btn="oled">🌑 OLED</button>
        <button class="theme-btn" data-theme-btn="dimmed">🌙 Dimmed</button>
        <button class="theme-btn" data-theme-btn="midnight">🌌 Midnight</button>
    </div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('short')">⚡ Short Version</button>
    <button class="tab-btn" onclick="showTab('combined')">📖 Combined Knowledge</button>
    <button class="tab-btn" onclick="showTab('chunks')">📄 All Chunks</button>
</div>

<div id="tab-short" class="tab-content active">
    <div class="content" id="final-content"><p class="loading">Rendering...</p></div>
</div>

<div id="tab-combined" class="tab-content">
    <div class="content" id="combined-content"><p class="loading">Rendering...</p></div>
</div>

<div id="tab-chunks" class="tab-content">
    {{CHUNKS_ACCORDION}}
</div>

<textarea id="data-final" hidden>{{FINAL_TEXT}}</textarea>
<textarea id="data-combined" hidden>{{COMBINED_TEXT}}</textarea>
{{DATA_TEXTAREAS}}

<script>
var THEMES = ['white','paper','dusk','oled','dimmed','midnight'];

function setTheme(name) {
    if (THEMES.indexOf(name) === -1) name = 'dimmed';
    document.body.setAttribute('data-theme', name);
    localStorage.setItem('bookconvert-theme', name);
    document.querySelectorAll('.theme-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-theme-btn') === name);
    });
}

function getRaw(id) {
    var el = document.getElementById(id);
    return el ? el.value : '';
}

function render(rawText) {
    if (!rawText || !rawText.trim()) return '';
    var text = rawText.trim();
    text = text.replace(/^---[\s\S]*?---\s*/, '');
    if (/^```[\w]*\s*\n/.test(text) && /\n```\s*$/.test(text)) {
        text = text.replace(/^```[\w]*\s*\n/, '').replace(/\n```\s*$/, '');
    }
    try {
        return marked.parse(text);
    } catch(e) {
        return '<pre>' + text.replace(/&/g, '&amp;').replace(/</g, '&lt;') + '</pre>';
    }
}

document.addEventListener('DOMContentLoaded', function() {
    marked.setOptions({ breaks: true, gfm: true });

    // Theme init
    var saved = localStorage.getItem('bookconvert-theme');
    setTheme(saved || 'dimmed');
    document.querySelectorAll('.theme-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            setTheme(btn.getAttribute('data-theme-btn'));
        });
    });

    // Render final
    var finalEl = document.getElementById('final-content');
    var finalRaw = getRaw('data-final');
    finalEl.innerHTML = finalRaw.trim()
        ? render(finalRaw)
        : '<p class="empty">No final synthesis available yet.</p>';

    // Render combined knowledge
    var combinedEl = document.getElementById('combined-content');
    var combinedRaw = getRaw('data-combined');
    combinedEl.innerHTML = combinedRaw.trim()
        ? render(combinedRaw)
        : '<p class="empty">No combined knowledge available yet.</p>';

    // Lazy render accordions
    document.querySelectorAll('.chunk-accordion[data-source]').forEach(function(el) {
        el.addEventListener('toggle', function() {
            if (el.open) {
                var targetId = el.dataset.target;
                var contentEl = document.getElementById(targetId);
                if (contentEl && contentEl.querySelector('.loading')) {
                    contentEl.innerHTML = render(getRaw(el.dataset.source));
                }
            }
        });
    });
});

function showTab(name) {
    document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
    document.querySelectorAll('.tab-btn').forEach(function(el) { el.classList.remove('active'); });
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
}
</script>

</body>
</html>
