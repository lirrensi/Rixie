# ═══════════════════════════════════════════════════════════════
# BookConvert Configuration
# ═══════════════════════════════════════════════════════════════
# Edit these values to match your setup. 
# This file is the ONLY place you need to change LLM settings.

# ─── LLM Connection ─────────────────────────────────────────
llm:
  base_url: "http://localhost:58080/v1"  # OpenAI-compatible endpoint
  api_key: "local"                       # API key (use "local" for no auth)
  model: "gpt-4o-mini"                   # Model name
  temperature: 0.3                       # Creativity (0=deterministic, 1=chaos)
  request_timeout_seconds: 300           # Per-call timeout (seconds)

# ─── Chunking ───────────────────────────────────────────────
chunking:
  max_tokens: 8000           # Max tokens per chunk (tiktoken)
  encoding_model: "gpt-4o-mini"  # Which tokenizer to use

# ─── Synthesis ──────────────────────────────────────────────
synthesis:
  temperature: 0.4           # Slightly higher for creative synthesis
  context_window: 64000      # Your LLM's context window size
  prompt_overhead: 2000      # Reserved for system prompt
  response_reserve: 8000     # Reserved for LLM response
  group_target_tokens: 8000  # Tokens per group (same as chunking max_tokens)
  final_chunk_size: 40000    # Target tokens per final synthesis pass (0=auto from context_window)

# ─── Output ─────────────────────────────────────────────────
output:
  generate_html: true        # Export HTML after synthesis
  generate_final: true       # Run final merge step

# ─── V2 Progressive Pipeline ───────────────────────────────────
v2:
  defaults:
    base_url: "http://localhost:58080/v1"  # Shared OpenAI-compatible endpoint
    api_key: "local"                       # Shared API key (use "local" for no auth)
    model: "gpt-4o-mini"                   # Shared default model
    temperature: 0.2                       # Shared default temperature
    request_timeout_seconds: 300           # Shared per-call timeout (seconds)
    thinking: true                         # Default thinking enabled

  profiles:
    mini_summary:
      prompt_file: "prompt_block_mini_summary.md"
      temperature: 0.1
      thinking: false
      # model: null
      # base_url: null
      # api_key: null
      # request_timeout_seconds: 300

    cartography:
      prompt_file: "prompt_cartographer_map.md"
      thinking: true
      # model: null
      # temperature: 0.1
      # base_url: null
      # api_key: null
      # request_timeout_seconds: 300

    chapter_short:
      prompt_file: "prompt_chapter_short.md"
      temperature: 0.25
      thinking: true
      # model: null
      # base_url: null
      # api_key: null
      # request_timeout_seconds: 300

    chapter_long:
      prompt_file: "prompt_chapter_detailed.md"
      temperature: 0.25
      thinking: true
      # model: null
      # base_url: null
      # api_key: null
      # request_timeout_seconds: 300

  blocking:
    encoding_model: "gpt-4o-mini"  # Tokenizer model for synthetic page splitting
    target_tokens: 4096             # Target synthetic-page size (mechanical fallback)
    min_tokens: 3884                # Prefer not to split below this unless needed
    max_tokens: 4396                # Hard-ish cap before forcing a split
    # Step 0: Precise LLM boundary detection
    window_tokens: 8000             # Token budget per LLM chunking window
    max_boundaries_per_window: 16   # Max boundaries the LLM can return per window
    overlap_pct: 0.05               # Overlap between adjacent windows (5%)
  execution:
    parallel_calls: 1               # Parallel lightweight LLM calls (set 1 for chunky/local runs)
    checkpoint_pct: 5.0              # Save progress every N% of blocks/chapters (0=every step, 100=only at end)
    context_window: 128000           # Your model's total context window in tokens
    prompt_overhead: 4000            # Reserve for system prompts + formatting overhead
    response_reserve: 8000           # Reserve for the LLM's response tokens

